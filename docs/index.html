<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media IP Tracker v2</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="#home" data-route="home" aria-label="検索トップへ">
      <span class="brand-mark">IP</span>
      <span><strong>Media IP Tracker</strong></span>
    </a>
    <nav class="top-actions" aria-label="画面切り替え">
      <button data-route="home" title="検索" aria-label="検索">検索</button>
      <button data-route="saved" title="保存済み / お気に入り" aria-label="保存済み / お気に入り">お気に入り</button>
      <button data-route="settings" title="設定/API・データ管理" aria-label="設定/API・データ管理">設定</button>
    </nav>
  </header>

  <main>
    <section id="homeView" class="view active hero" aria-labelledby="homeTitle">
      <p class="eyebrow">漫画・アニメ・ドラマ・映画・小説を横断検索</p>
      <h1 id="homeTitle">作品名から媒体別の候補を探す</h1>
      <form id="searchForm" class="search-box" aria-describedby="homeTitle">
        <label class="sr-only" for="queryInput">作品名</label>
        <input id="queryInput" type="search" required placeholder="作品名を入力" autocomplete="off">
        <button class="primary search-submit" type="submit" title="検索する" aria-label="検索する">検索</button>
      </form>
      <section class="saved-preview" aria-labelledby="homeSavedTitle">
        <div class="section-head compact-head"><div><h2 id="homeSavedTitle">最近保存した作品</h2></div><button data-route="saved" type="button" title="保存済みを開く" aria-label="保存済みを開く">保存済み</button></div>
        <div id="homeSavedPreview" class="mini-list"></div>
      </section>
    </section>

    <section id="resultsView" class="view" aria-live="polite">
      <div class="result-hero">
        <p class="eyebrow">検索結果</p>
        <h1 id="resultTitle">作品名</h1>
        <div class="result-title-row"><p id="resultSummary" class="lead"></p><button id="resultFavoriteBtn" class="favorite-btn" type="button">☆ お気に入り</button></div>
      </div>
      <nav id="toc" class="toc" aria-label="検索結果の目次"></nav>
      <div id="searchStatus" class="message" role="status"></div>
      <div id="resultsContent" class="stack"></div>
    </section>

    <section id="savedView" class="view" aria-labelledby="savedTitle">
      <div class="section-head"><div><p class="eyebrow">Library</p><h1 id="savedTitle">保存済み作品IP</h1></div><button id="manualAddBtn" title="検索で見つからない場合はこちら" aria-label="検索で見つからない場合はこちら">補助保存</button></div>
      <label class="filter-line"><input id="favoriteOnlyFilter" type="checkbox"> お気に入りのみ表示</label>
      <div id="savedList" class="card-grid"></div>
    </section>

    <section id="detailView" class="view" aria-labelledby="detailTitle">
      <button class="backBtn" data-route="saved">← 保存済みに戻る</button>
      <div id="detailContent"></div>
    </section>

    <section id="settingsView" class="view" aria-labelledby="settingsTitle">
      <p class="eyebrow">Settings</p>
      <h1 id="settingsTitle">設定</h1>
      <div class="panel stack">
        <p>TMDbは任意です。未設定でも基本検索は使えます。</p>
        <label>TMDb Read Access Token<input id="tmdbTokenInput" type="password" placeholder="eyJhbGciOiJIUzI1NiJ9..." autocomplete="off"></label>
        <div class="button-row"><button id="saveTokenBtn" class="primary">保存</button><button id="clearTokenBtn">削除</button></div>
        <label class="filter-line"><input id="searchDebugToggle" type="checkbox">検索デバッグ表示</label>
        <p id="settingsMessage" class="message" role="status"></p>
      </div>
      <details class="secondary-tools data-tools">
        <summary title="データ管理" aria-label="データ管理">データ管理</summary>
        <div class="panel stack">
          <p>JSONでバックアップ/復元できます。</p>
          <div class="button-row"><button id="exportBtn" class="primary" title="JSONエクスポート" aria-label="JSONエクスポート">エクスポート</button><button id="clearSavedBtn" class="danger" title="保存済みを全削除" aria-label="保存済みを全削除">全削除</button></div>
          <label>JSONインポート<textarea id="importText" rows="8" placeholder="エクスポートしたJSONを貼り付け"></textarea></label>
          <button id="importBtn">インポート</button>
          <p id="dataMessage" class="message" role="status"></p>
        </div>
      </details>
    </section>
  </main>

  <dialog id="manualDialog">
    <form method="dialog" id="manualForm" class="editor-form">
      <h2>検索で見つからない作品を手動保存</h2>
      <label>作品名<input name="title" required></label>
      <label>媒体<select name="media"><option>漫画</option><option>アニメ</option><option>ドラマ</option><option>映画</option><option>小説</option></select></label>
      <label>メモ<textarea name="memo" rows="4"></textarea></label>
      <div class="button-row"><button value="cancel">キャンセル</button><button class="primary" value="save">保存</button></div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
