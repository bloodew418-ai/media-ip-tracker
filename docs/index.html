<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media IP Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">個人用 作品IP横断管理</p>
      <h1>Media IP Tracker</h1>
    </div>
    <nav class="top-actions" aria-label="主要操作">
      <button id="autoSearchBtn">自動検索</button>
      <button id="addGroupBtn" class="primary">作品グループ追加</button>
      <button id="dataViewBtn">データ管理</button>
    </nav>
  </header>

  <main>
    <section id="listView" class="view active" aria-labelledby="listTitle">
      <div class="section-head">
        <div>
          <h2 id="listTitle">検索 / 一覧</h2>
          <p>配信中・販売中とは断定せず、確認状態を分けて記録します。</p>
        </div>
      </div>
      <form id="filters" class="filters">
        <label>タイトル検索<input id="titleSearch" type="search" placeholder="代表タイトル・別名"></label>
        <label>タグ検索<input id="tagSearch" type="search" placeholder="SF, ミステリ"></label>
        <label>媒体タイプ<select id="mediaFilter"></select></label>
        <label>作品状態<select id="groupStatusFilter"></select></label>
      </form>
      <div id="groupList" class="card-grid"></div>
    </section>

    <section id="autoSearchView" class="view" aria-labelledby="autoSearchTitle">
      <button class="backBtn">← 一覧へ</button>
      <div class="section-head">
        <div>
          <h2 id="autoSearchTitle">公開データ自動検索</h2>
          <p>Google Books、AniList、Wikidataの公開APIから候補を探します。APIキーが必要なサービスやスクレイピングは使いません。</p>
        </div>
      </div>
      <form id="autoSearchForm" class="filters auto-search-form">
        <label>検索キーワード<input id="autoSearchQuery" type="search" placeholder="作品名を入力" required></label>
        <button id="autoSearchSubmit" class="primary" type="submit">検索</button>
      </form>
      <div id="autoSearchStatus" class="message" role="status"></div>
      <div id="autoSearchErrors" class="stack"></div>
      <div id="autoSearchResults" class="search-result-grid"></div>
    </section>

    <section id="detailView" class="view" aria-labelledby="detailTitle">
      <button class="backBtn">← 一覧へ</button>
      <div id="detailContent"></div>
    </section>

    <section id="groupFormView" class="view" aria-labelledby="groupFormTitle">
      <button class="backBtn">← 一覧へ</button>
      <h2 id="groupFormTitle">作品グループ編集</h2>
      <form id="groupForm" class="editor-form"></form>
    </section>

    <section id="mediaFormView" class="view" aria-labelledby="mediaFormTitle">
      <button class="backBtn">← 詳細へ</button>
      <h2 id="mediaFormTitle">媒体版編集</h2>
      <form id="mediaForm" class="editor-form"></form>
    </section>

    <section id="dataView" class="view" aria-labelledby="dataTitle">
      <button class="backBtn">← 一覧へ</button>
      <h2 id="dataTitle">データ管理</h2>
      <div class="panel stack">
        <p>データはこのブラウザの localStorage に保存されます。外部API連携やスクレイピングは行いません。</p>
        <div class="button-row"><button id="exportBtn" class="primary">JSONエクスポート</button><button id="loadSampleBtn">サンプルデータ読込</button></div>
        <label>JSONインポート<textarea id="importText" rows="10" placeholder="エクスポートしたJSONを貼り付け"></textarea></label>
        <button id="importBtn">インポート</button>
        <p id="dataMessage" class="message" role="status"></p>
      </div>
    </section>
  </main>

  <template id="confirmTemplate"></template>
  <script src="app.js"></script>
</body>
</html>
